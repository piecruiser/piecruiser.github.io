<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5fd068"/>
      <stop offset="100%" stop-color="#2e9e4f"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f1e728"/>
      <stop offset="100%" stop-color="#ff9472"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.9"/>

  <!-- Circuit-style corner ticks (AI motif) -->
  <g stroke="url(#ringGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.85">
    <path d="M100 8 L100 20"/>
    <path d="M100 192 L100 180"/>
    <path d="M8 100 L20 100"/>
    <path d="M192 100 L180 100"/>
    <circle cx="100" cy="14" r="3" fill="url(#ringGrad)"/>
    <circle cx="100" cy="186" r="3" fill="url(#ringGrad)"/>
    <circle cx="14" cy="100" r="3" fill="url(#ringGrad)"/>
    <circle cx="186" cy="100" r="3" fill="url(#ringGrad)"/>
  </g>

  <!-- Leaf body -->
  <path d="M100 45
           C 135 55, 152 88, 142 120
           C 132 152, 100 162, 100 162
           C 100 162, 68 152, 58 120
           C 48 88, 65 55, 100 45 Z"
        fill="url(#leafGrad)"/>

  <!-- Leaf vein -->
  <path d="M100 60 L100 155" stroke="#1f6b34" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  <path d="M100 85 L82 102" stroke="#1f6b34" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M100 85 L118 102" stroke="#1f6b34" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M100 112 L80 130" stroke="#1f6b34" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M100 112 L120 130" stroke="#1f6b34" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Scan / detection nodes (AI detection motif) -->
  <g fill="#f1e728">
    <circle cx="78" cy="98" r="3.4"/>
    <circle cx="124" cy="108" r="3.4"/>
    <circle cx="100" cy="135" r="3.4"/>
  </g>
  <g stroke="#f1e728" stroke-width="1.4" opacity="0.7">
    <path d="M78 98 L124 108"/>
    <path d="M124 108 L100 135"/>
    <path d="M100 135 L78 98"/>
  </g>
</svg>
